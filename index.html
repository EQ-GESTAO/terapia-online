<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Colo · Terapia 24h</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{background:#f3efe8;font-family:'Mulish',-apple-system,sans-serif;color:#2d2a26;}
  #app{min-height:100vh;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:rgba(45,42,38,.16);border-radius:8px;border:2px solid transparent;background-clip:padding-box;}
  ::-webkit-scrollbar-track{background:transparent;}
  input,textarea,button,select{font-family:inherit;outline:none;}
  input::placeholder,textarea::placeholder{color:#b3ada1;}
  button{cursor:pointer;}
  a{cursor:pointer;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.35;}}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(207,79,61,.45);}70%{box-shadow:0 0 0 12px rgba(207,79,61,0);}100%{box-shadow:0 0 0 0 rgba(207,79,61,0);}}
  .field{width:100%;padding:12px 15px;border:1.5px solid #e2dccf;border-radius:11px;background:#fff;font-size:15px;color:#2d2a26;}
  .primary{width:100%;padding:14px;border:none;border-radius:11px;background:#3f6b52;color:#f4efe6;font-size:15.5px;font-weight:700;box-shadow:0 6px 16px rgba(63,107,82,.22);transition:.15s;}
  .primary:hover{background:#34593f;}
  .ghost{padding:12px;border:1.5px solid #e2dccf;border-radius:11px;background:#fff;color:#6b655b;font-size:14px;font-weight:700;}
  .toast{position:fixed;left:50%;bottom:30px;transform:translateX(-50%);background:#2d2a26;color:#f4efe6;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:600;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:fadeUp .3s ease;}
  .seg{flex:1;padding:10px;border:none;border-radius:10px;font-size:14px;font-weight:700;transition:.15s;}
  .convrow:hover{background:#f3efe8 !important;}
  @media(max-width:820px){
    .login-aside{display:none !important;}
    .login-panel{width:100% !important;flex:1 !important;padding:32px 22px !important;}
    .col-list{width:100% !important;flex:1 0 100% !important;}
    .col-main,.col-info{display:none !important;}
    .col-list.hide{display:none !important;}
    .col-main.show{display:flex !important;flex:1 0 100% !important;}
    .col-info.show{display:block !important;width:100% !important;flex:1 0 100% !important;}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="modalRoot"></div>

<script>
/* ============================================================
   Colo · Terapia 24h — protótipo funcional v2
   Papéis: paciente · terapeuta · gestão
   Conversas por atendimento (fila → puxar → exclusivo)
   Perfis editáveis com foto · fundo verde com pattern
   Conectado ao Supabase (Auth + Postgres/RLS + Realtime)
   ============================================================ */

/* ============================================================
   CONFIGURAÇÃO DO SUPABASE
   Troque pelos dados do SEU projeto se mudar de ambiente.
   Estas chaves são públicas (o que protege os dados é o RLS).
   ============================================================ */
const SUPA_URL  = "https://jyuidyfkqayjoxignoez.supabase.co";
const SUPA_ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5dWlkeWZrcWF5am94aWdub2V6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyMDk5MTEsImV4cCI6MjA5Nzc4NTkxMX0.Da5DPM3na2R4WlIB0sp58rQddcqIB23SP8zfyx8J8jQ";

let sb = null;
function initSupabase(){
  if(!window.supabase || !window.supabase.createClient){ showFatal("Não consegui carregar a biblioteca do Supabase (verifique sua conexão)."); return false; }
  sb = window.supabase.createClient(SUPA_URL, SUPA_ANON, { auth:{ persistSession:true, autoRefreshToken:true } });
  return true;
}

/* mostra erros do backend de forma visível (pra iterarmos rápido) */
function showFatal(msg){
  let b=document.getElementById("errbar");
  if(!b){ b=document.createElement("div"); b.id="errbar";
    b.style.cssText="position:fixed;top:0;left:0;right:0;z-index:99999;background:#b5483a;color:#fff;font:600 13px/1.4 'Mulish',sans-serif;padding:10px 16px;text-align:center;box-shadow:0 2px 10px rgba(0,0,0,.2);";
    document.body.appendChild(b); }
  b.textContent = "⚠ " + msg + "  (toque para ocultar)";
  b.onclick=()=>b.remove();
}
function sbErr(context, error){ if(error){ console.error(context, error); toast(context+": "+(error.message||error)); } return error; }

/* ---------- utilidades ---------- */
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const nowHM = (ts) => { const d = ts ? new Date(ts) : new Date(); return String(d.getHours()).padStart(2,"0")+":"+String(d.getMinutes()).padStart(2,"0"); };
const initials = (n) => (n||"?").trim().split(/\s+/).map(w=>w[0]).slice(0,2).join("").toUpperCase();
const esc = (s) => (s==null?"":String(s)).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const COLORS = ["#cf8d6c","#6c8fcf","#7fa06b","#b07fc0","#c79a6a","#5c8a8a","#c08a8a","#3f6b52"];
function colorFor(name){ let h=0; for(let i=0;i<(name||"").length;i++) h=(h*31+name.charCodeAt(i))>>>0; return COLORS[h % COLORS.length]; }
function relTime(ts){ if(!ts) return ""; const m=Math.floor(Math.max(0,Date.now()-ts)/60000); if(m<1) return "agora"; if(m<60) return m+" min"; const h=Math.floor(m/60); if(h<24) return h+"h"; return Math.floor(h/24)+"d"; }
function weakHash(str){ let h=5381; for(let i=0;i<str.length;i++){ h=((h<<5)+h)+str.charCodeAt(i); } return (h>>>0).toString(36); }
const roleLabel = r => r==="gestao"?"Gestão":r==="terapeuta"?"Terapeuta":"Paciente";

/* ---------- estado de sessão (por aba) ---------- */
const S = {
  session: null,
  screen: "login",
  loginRole: "paciente",
  su: { step:1, nome:"", email:"", senha:"", motivos:[] },
  pActive: null,          // conversa ativa do paciente
  tTab: "aguardando",     // aba do terapeuta
  tActive: null,
  gView: "relatorios",    // aba da gestão
  gActive: null,
  gFilter: "todas",
  recording: null,
  toastTimer: null,
  photoPending: undefined // foto carregada no modal (data url) ainda não salva
};

/* ---------- perfis / usuários ---------- */
let PROFILE = null;     // perfil do usuário logado
let USERS = {};         // id -> perfil (apenas os visíveis via RLS)
function me(){ return PROFILE; }
function normProfile(p){ if(p){ p.photo = p.photo_url || null; } return p; }
async function loadUsers(){
  const { data, error } = await sb.from('profiles').select('*');
  if(error){ sbErr('Carregar perfis', error); return USERS; }
  USERS = {}; (data||[]).forEach(p=>{ USERS[p.id]=normProfile(p); });
  return USERS;
}
function userById(id){ return id ? (USERS[id]||null) : null; }
async function refreshProfile(){
  const { data: s } = await sb.auth.getSession();
  if(!s || !s.session){ PROFILE=null; return null; }
  const { data, error } = await sb.from('profiles').select('*').eq('id', s.session.user.id).maybeSingle();
  if(error){ sbErr('Carregar seu perfil', error); }
  PROFILE = data ? normProfile(data) : null;
  if(PROFILE){ PROFILE.email = s.session.user.email; USERS[PROFILE.id]=PROFILE; }
  return PROFILE;
}

/* ---------- configurações ---------- */
const DEFAULT_SET = {
  plataforma:"Colo", welcomeOn:true,
  welcomeMsg:"Você está na fila de espera 🌿 Um terapeuta de plantão vai te acolher em instantes. Pode já ir escrevendo como está se sentindo.",
  quickReplies:["Tô aqui com você 🌿","Vamos respirar juntos?","Me conta mais sobre isso","Você fez bem em escrever"],
  temas:["Ansiedade","Insônia","Tristeza","Luto","Relacionamento","Trabalho","Pânico","Outro"]
};
let SET = Object.assign({}, DEFAULT_SET);
async function loadSettings(){
  const { data } = await sb.from('settings').select('*').eq('id',1).maybeSingle();
  if(data){ SET = { plataforma:data.plataforma, welcomeOn:data.welcome_on, welcomeMsg:data.welcome_msg,
                    quickReplies:data.quick_replies||[], temas:data.temas||[] }; }
  return SET;
}
async function saveSettings(patch){
  SET = Object.assign({}, SET, patch);
  const row = { plataforma:SET.plataforma, welcome_on:SET.welcomeOn, welcome_msg:SET.welcomeMsg,
                quick_replies:SET.quickReplies, temas:SET.temas };
  const { error } = await sb.from('settings').update(row).eq('id',1);
  sbErr('Salvar configurações', error);
}

/* ---------- presença (entra numa fase futura) ---------- */
async function heartbeat(){ /* noop nesta fase */ }
async function onlineEmails(){ return {}; }
function emailOf(){ return ""; }

/* ---------- conversas (atendimentos) ---------- */
function mapConv(c){
  const lastFrom = c.last_from;
  return {
    id:c.id, patientId:c.patient_id, therapistId:c.therapist_id, status:c.status,
    createdAt: c.created_at ? new Date(c.created_at).getTime() : Date.now(),
    claimedAt: c.claimed_at ? new Date(c.claimed_at).getTime() : null,
    closedAt:  c.closed_at  ? new Date(c.closed_at).getTime()  : null,
    lastTs: c.last_ts ? new Date(c.last_ts).getTime() : 0,
    lastText: c.last_text||"", lastFrom,
    pcount: lastFrom==='paciente' ? 1 : 0,
    count:  lastFrom ? 1 : 0,
    unreadP: c._unread?1:0, unreadT: c._unread?1:0
  };
}
async function listConvs(){
  const { data, error } = await sb.from('conversations').select('*').order('last_ts',{ascending:false});
  if(error){ sbErr('Carregar conversas', error); return []; }
  let rr = {};
  if(PROFILE){
    const { data: rrs } = await sb.from('read_receipts').select('conversation_id,last_read_at').eq('user_id', PROFILE.id);
    (rrs||[]).forEach(r=> rr[r.conversation_id]= new Date(r.last_read_at).getTime());
  }
  const myRole = PROFILE ? PROFILE.role : null;
  return (data||[]).map(c=>{
    const lastTs = c.last_ts ? new Date(c.last_ts).getTime() : 0;
    c._unread = !!(c.last_from && c.last_from !== myRole && (!rr[c.id] || lastTs > rr[c.id]));
    return mapConv(c);
  });
}
async function loadMsgs(convId){
  const { data, error } = await sb.from('messages').select('*').eq('conversation_id',convId).order('created_at',{ascending:true});
  if(error){ sbErr('Carregar mensagens', error); return []; }
  return (data||[]).map(m=>({
    id:m.id, from:m.sender_role, kind: m.kind==='audio'?'audio':'text',
    text:m.body||"", ts: m.created_at ? new Date(m.created_at).getTime() : Date.now()
  }));
}
async function createConv(patientId){
  const pid = patientId || (PROFILE && PROFILE.id);
  const { data: ex } = await sb.from('conversations').select('id,last_from,status').eq('patient_id',pid).eq('status','aguardando');
  const empty=(ex||[]).find(c=> c.last_from===null || c.last_from==='sistema');
  if(empty) return empty.id;
  const { data, error } = await sb.from('conversations').insert({ patient_id: pid }).select().single();
  if(error){ sbErr('Iniciar conversa', error); return null; }
  return data.id;
}
async function pushMsg(convId, msg){
  const { error } = await sb.from('messages').insert({
    conversation_id: convId, sender_id: PROFILE.id, sender_role: msg.from,
    kind: msg.kind==='audio'?'audio':'texto', body: msg.text||""
  });
  sbErr('Enviar mensagem', error);
}
async function markRead(convId){
  if(!convId) return;
  await sb.rpc('mark_read', { cid: convId });
}
async function claimConv(convId){
  const { error } = await sb.rpc('claim_conversation', { cid: convId });
  if(error){ toast(error.message||"Não foi possível atender."); return false; }
  return true;
}
async function closeConv(convId){
  const { error } = await sb.from('conversations').update({ status:'encerrado', closed_at:new Date().toISOString() }).eq('id',convId);
  sbErr('Encerrar atendimento', error);
}
async function reopenConv(convId){
  const { error } = await sb.from('conversations').update({ status:'ativo' }).eq('id',convId);
  sbErr('Reabrir atendimento', error);
}
async function getNotes(convId){
  const { data } = await sb.from('notes').select('body').eq('conversation_id',convId).maybeSingle();
  return data ? (data.body||"") : "";
}
async function setNotes(convId, body){
  const { error } = await sb.from('notes').upsert({ conversation_id:convId, therapist_id:PROFILE.id, body, updated_at:new Date().toISOString() });
  sbErr('Salvar anotação', error);
}
async function getConv(id){
  const { data } = await sb.from('conversations').select('*').eq('id',id).maybeSingle();
  return data ? mapConv(data) : null;
}

/* ---------- tempo real (push) ---------- */
let RT = null, rtTimer = null;
function scheduleRefresh(){
  clearTimeout(rtTimer);
  rtTimer = setTimeout(()=>{
    if(S.screen==="patient") refreshPatient(false);
    else if(S.screen==="therapist") refreshTherapist(false);
    else if(S.screen==="gestao") refreshGestao(false);
  }, 250);
}
function startRealtime(){
  if(RT || !sb) return;
  RT = sb.channel('colo-rt')
    .on('postgres_changes', { event:'*', schema:'public', table:'messages' }, scheduleRefresh)
    .on('postgres_changes', { event:'*', schema:'public', table:'conversations' }, scheduleRefresh)
    .subscribe();
}
function stopRealtime(){ if(RT){ try{ sb.removeChannel(RT); }catch(e){} RT=null; } }

/* ============================================================
   RENDER
   ============================================================ */
const app = () => document.getElementById("app");
function render(){
  if(S.screen==="login") renderLogin();
  else if(S.screen==="signup") renderSignup();
  else if(S.screen==="patient") renderPatient();
  else if(S.screen==="therapist") renderTherapist();
  else if(S.screen==="gestao") renderGestao();
}

/* ---------- componentes reutilizáveis ---------- */
function logoMark(size, base, dot, ring){
  const d=Math.round(size*0.62), o=Math.round(size*0.09), bw=Math.max(2,Math.round(size*0.09));
  return `<div style="position:relative;width:${size}px;height:${size}px;flex:0 0 auto;">
    <div style="position:absolute;inset:0;border-radius:50%;background:${base};"></div>
    <div style="position:absolute;right:-${o}px;bottom:-${o}px;width:${d}px;height:${d}px;border-radius:50%;background:${dot};border:${bw}px solid ${ring};"></div></div>`;
}
function avatar(user, size, ring){
  const s = size||44; const r = ring? `box-shadow:0 0 0 2.5px ${ring};` : "";
  if(user && user.photo){
    return `<img src="${user.photo}" style="width:${s}px;height:${s}px;border-radius:50%;object-fit:cover;flex:0 0 auto;${r}" alt="">`;
  }
  const name = user? user.name : "?";
  return `<div style="width:${s}px;height:${s}px;border-radius:50%;background:${colorFor(name)};color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:${Math.round(s*0.36)}px;font-family:'Newsreader',serif;flex:0 0 auto;${r}">${initials(name)}</div>`;
}
function greenPattern(idSuffix){
  const id = "leaf-"+idSuffix;
  return `<svg width="100%" height="100%" preserveAspectRatio="xMidYMid slice" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:0;" xmlns="http://www.w3.org/2000/svg">
    <defs><pattern id="${id}" width="56" height="56" patternUnits="userSpaceOnUse" patternTransform="rotate(9)">
      <g fill="none" stroke="#34593f" stroke-width="1.3" opacity="0.09">
        <path d="M12 32 C12 21 22 17 30 14 C27 25 21 32 12 32 Z"/>
        <path d="M30 14 C30 14 28 22 18 28"/>
        <path d="M44 6 C44 1 49 -1 53 -2 C51 4 48 6 44 6 Z"/>
      </g>
      <circle cx="6" cy="48" r="1.5" fill="#34593f" opacity="0.10"/>
      <circle cx="46" cy="42" r="1.3" fill="#34593f" opacity="0.08"/>
    </pattern></defs>
    <rect width="100%" height="100%" fill="url(#${id})"/></svg>`;
}
function bubble(m, mine, cozy){
  if(m.from==="sistema"){
    return `<div style="display:flex;justify-content:center;position:relative;z-index:1;margin:2px 0;">
      <div style="max-width:80%;text-align:center;font-size:13px;line-height:1.5;color:#3f6b52;background:rgba(255,255,255,.78);border:1px solid #d4e4d9;border-radius:14px;padding:9px 16px;">${esc(m.text)}</div></div>`;
  }
  let maxW,padd,fs,lh,radius,bg,color,border,shadow;
  if(cozy){
    maxW="min(620px, 82%)"; padd="12px 16px"; fs="15px"; lh=1.55;
    radius = mine?"20px 20px 6px 20px":"20px 20px 20px 6px";
    bg = mine?"#d9ece1":"#ffffff"; color="#2d2a26";
    border = mine?"1px solid #cbe1d3":"1px solid #ece7de"; shadow="0 1px 3px rgba(45,42,38,.06)";
  } else {
    maxW="min(560px, 74%)"; padd="8px 12px 7px"; fs="14px"; lh=1.45; radius="11px";
    bg = mine?"#dcf2e4":"#ffffff"; color="#2d2a26"; border="1px solid "+(mine?"#cbe7d3":"#ece7de"); shadow="0 1px 2px rgba(45,42,38,.05)";
  }
  const row = `display:flex;justify-content:${mine?"flex-end":"flex-start"};position:relative;z-index:1;`;
  const bub = `max-width:${maxW};word-break:break-word;padding:${padd};font-size:${fs};line-height:${lh};border-radius:${radius};background:${bg};color:${color};border:${border};box-shadow:${shadow};`;
  const tstyle = `font-size:10.5px;color:${mine?"rgba(45,42,38,.42)":"#b3ada1"};margin-top:5px;text-align:${mine?"right":"left"};`;
  let inner;
  if(m.kind==="audio"){
    const barColor = mine?"#79a78c":"#c5beb2"; const playBg = mine?"#3f6b52":"#7fa890";
    const bars = AUDIOBARS.map((h,i)=>`<div data-i="${i}" style="width:3px;height:${Math.max(4,h)}px;border-radius:2px;background:${barColor};opacity:${i<9?1:.55};transition:opacity .1s;"></div>`).join("");
    inner = `<div class="audio-msg" data-aid="${esc(m.audioId||"")}" style="display:flex;align-items:center;gap:11px;min-width:210px;">
      <div class="audio-play" style="width:30px;height:30px;border-radius:50%;background:${playBg};color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;padding-left:2px;flex:0 0 auto;cursor:pointer;">▶</div>
      <div class="audio-bars" style="display:flex;align-items:flex-end;gap:2px;height:26px;flex:1;">${bars}</div>
      <span style="font-size:11.5px;opacity:.6;flex:0 0 auto;">${esc(m.dur||"0:00")}</span></div>`;
  } else inner = `<div>${esc(m.text)}</div>`;
  return `<div style="${row}"><div style="${bub}">${inner}<div style="${tstyle}">${nowHM(m.ts)}</div></div></div>`;
}
const AUDIOBARS = [7,12,18,9,22,14,25,17,10,21,13,8,19,24,11,16,9,20,13,23,15,8,18,11,21,14,10,17];

/* ============================================================
   LOGIN
   ============================================================ */
function renderLogin(){
  const segP = S.loginRole==="paciente";
  app().innerHTML = `
  <div style="min-height:100vh;display:flex;">
    <div class="login-aside" style="flex:1.1;background:linear-gradient(155deg,#3f6b52 0%,#34593f 100%);color:#f4efe6;padding:60px 64px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden;min-width:0;">
      <div style="position:absolute;width:440px;height:440px;border-radius:50%;background:rgba(255,255,255,.05);right:-160px;top:-140px;"></div>
      <div style="position:absolute;width:300px;height:300px;border-radius:50%;background:rgba(255,255,255,.04);left:-120px;bottom:-110px;"></div>
      <div style="display:flex;align-items:center;gap:12px;position:relative;">${logoMark(34,"#f4efe6","#7fae90","#34593f")}<span style="font-family:'Newsreader',serif;font-size:23px;font-weight:600;">${esc(SET.plataforma||"Colo")}</span></div>
      <div style="position:relative;max-width:460px;">
        <h1 style="font-family:'Newsreader',serif;font-weight:500;font-size:46px;line-height:1.12;margin:0 0 20px;letter-spacing:-.5px;">Cuidado a qualquer hora do dia.</h1>
        <p style="font-size:17px;line-height:1.65;color:rgba(244,239,230,.82);margin:0;max-width:400px;">Terapia online quando e como você precisar. Uma conversa de distância — por texto ou áudio, com um terapeuta de plantão.</p>
      </div>
      <div style="position:relative;display:flex;align-items:center;gap:10px;font-size:14px;color:rgba(244,239,230,.85);" id="loginPresence">
        <span style="width:8px;height:8px;border-radius:50%;background:#9fe3b4;animation:blink 1.8s ease-in-out infinite;"></span> Plantão 24h
      </div>
    </div>
    <div class="login-panel" style="width:560px;flex:0 0 560px;display:flex;align-items:center;justify-content:center;padding:48px;background:#faf7f1;">
      <div style="width:100%;max-width:380px;animation:fadeUp .5s ease;">
        <p style="font-size:13px;letter-spacing:1.5px;text-transform:uppercase;color:#5c8a6f;font-weight:700;margin:0 0 8px;">Bem-vindo de volta</p>
        <h2 style="font-family:'Newsreader',serif;font-weight:500;font-size:30px;margin:0 0 28px;letter-spacing:-.3px;">Entrar na plataforma</h2>
        <div style="display:flex;gap:6px;background:#efe9df;padding:5px;border-radius:14px;margin-bottom:24px;">
          <button class="seg" data-role="paciente" style="${segStyle(segP)}">Sou paciente</button>

  document.getElementById("mpPhoto").onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    if(f.size>6*1024*1024){ document.getElementById("mpPhotoNote").textContent="Imagem muito grande (máx ~6MB)."; return; }
    handlePhotoFile(f, dataUrl=>{ S.photoPending=dataUrl; document.getElementById("mpAvatar").innerHTML=`<img src="${dataUrl}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;">`; document.getElementById("mpPhotoNote").textContent="Foto pronta — salve para confirmar."; });
  };
}
function pf(label,id,val,type,ph){ return `<label style="display:block;font-size:13px;font-weight:600;color:#6b655b;margin-bottom:6px;">${label}</label><input id="${id}" class="field" type="${type||'text'}" placeholder="${ph||''}" value="${esc(val)}" style="margin-bottom:16px;">`; }
function pfArea(label,id,val,ph){ return `<label style="display:block;font-size:13px;font-weight:600;color:#6b655b;margin-bottom:6px;">${label}</label><textarea id="${id}" class="field" placeholder="${ph||''}" style="min-height:80px;resize:vertical;margin-bottom:16px;line-height:1.5;">${esc(val)}</textarea>`; }
function closeModal(){ const r=document.getElementById("modalRoot"); if(r) r.innerHTML=""; }
function handlePhotoFile(file, cb){
  const r=new FileReader();
  r.onload=()=>{ const img=new Image(); img.onload=()=>{
    const max=256; let w=img.width,h=img.height; const sc=Math.min(1,max/Math.max(w,h)); w=Math.round(w*sc); h=Math.round(h*sc);
    const cv=document.createElement("canvas"); cv.width=w; cv.height=h; cv.getContext("2d").drawImage(img,0,0,w,h);
    try{ cb(cv.toDataURL("image/jpeg",0.82)); }catch(e){ cb(r.result); }
  }; img.onerror=()=>cb(r.result); img.src=r.result; };
  r.readAsDataURL(file);
}
async function saveProfile(role){
  const v=id=>{const el=document.getElementById(id);return el?el.value.trim():"";};
  const u=me(); if(!u) return;
  const nome=v("mpNome"); if(!nome){document.getElementById("mpErr").textContent="O nome não pode ficar vazio.";return;}
  const patch={ name:nome };
  if(S.photoPending!==undefined) patch.photo_url=S.photoPending;
  if(role==="paciente"){ patch.idade=v("mpIdade")?Number(v("mpIdade")):null; patch.fone=v("mpFone"); patch.sobre=v("mpSobre"); }
  else if(role==="terapeuta"){ patch.crp=v("mpCrp"); patch.bio=v("mpBio"); patch.espec=v("mpEsp").split(",").map(s=>s.trim()).filter(Boolean); }
  else { patch.cargo=v("mpCargo"); }
  const { error } = await sb.from('profiles').update(patch).eq('id', u.id);
  if(sbErr('Salvar perfil', error)) return;
  Object.assign(u, patch); u.photo = patch.photo_url!==undefined ? patch.photo_url : u.photo;
  S.session.name=u.name; S.session.photo=u.photo; S.session.crp=u.crp; S.session.cargo=u.cargo;
  closeModal(); toast("Perfil salvo."); render();
}

function fmtDur(ms){ if(ms==null||isNaN(ms)) return "—"; const m=Math.round(ms/60000); if(m<1) return "menos de 1 min"; if(m<60) return m+" min"; const h=Math.floor(m/60), r=m%60; return h+" h"+(r?(" "+r+" min"):""); }
function repCard(label,value,sub){ return `<div style="background:#fff;border:1px solid #ece5d8;border-radius:16px;padding:18px 20px;"><div style="font-size:13px;color:#8a847a;">${label}</div><div style="font-family:'Newsreader',serif;font-size:28px;font-weight:500;color:#34593f;line-height:1.12;margin-top:6px;">${value}</div>${sub?`<div style="font-size:12px;color:#a39d92;margin-top:5px;line-height:1.4;">${sub}</div>`:''}</div>`; }
function chartCard(title,inner){ return `<div style="background:#fff;border:1px solid #ece5d8;border-radius:16px;padding:20px 22px;"><div style="font-weight:700;font-size:14.5px;margin-bottom:16px;">${title}</div>${inner}</div>`; }
function barChart(items,accent){ const max=Math.max(1,...items.map(i=>i.value)); return `<div style="display:flex;flex-direction:column;gap:11px;">`+items.map(i=>`<div style="display:flex;align-items:center;gap:12px;"><div style="width:104px;font-size:12.5px;color:#6b655b;flex:0 0 auto;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${esc(i.label)}</div><div style="flex:1;height:22px;background:#f3efe8;border-radius:7px;overflow:hidden;"><div style="height:100%;width:${Math.round(i.value/max*100)}%;background:${accent};border-radius:7px;min-width:${i.value?'6px':'0'};transition:width .4s ease;"></div></div><div style="width:28px;font-size:13px;font-weight:700;flex:0 0 auto;">${i.value}</div></div>`).join("")+`</div>`; }
async function gatherReport(){
  const convs=await listConvs();
  const real=convs.filter(c=>(c.pcount||c.count)>0);
  const fila=real.filter(c=>c.status==="aguardando").length;
  const ativo=convs.filter(c=>c.status==="ativo").length;
  const encer=convs.filter(c=>c.status==="encerrado").length;
  const pac=new Set(real.map(c=>c.patientId)).size;
  const waits=[]; const porTher={}; const horas=[0,0,0,0];
  for(const c of convs){
    if(c.therapistId){
      porTher[c.therapistId]=(porTher[c.therapistId]||0)+1;
      if(c.claimedAt&&c.createdAt) waits.push(Math.max(0,c.claimedAt-c.createdAt));
    }
    if((c.pcount||c.count)>0&&c.createdAt){ const h=new Date(c.createdAt).getHours(); horas[Math.floor(h/6)]++; }
  }
  // total de mensagens (exceto 'sistema') numa só consulta de contagem
  let totalMsgs=0;
  const { count } = await sb.from('messages').select('id',{count:'exact',head:true}).neq('sender_role','sistema');
  if(typeof count==='number') totalMsgs=count;
  const avgWait=waits.length?waits.reduce((a,b)=>a+b,0)/waits.length:null;
  const therItems=Object.keys(porTher).map(id=>{const u=userById(id);return {label:u?u.name.replace(/^Dra?\.\s*/,""):"—",value:porTher[id]};}).sort((a,b)=>b.value-a.value);
  const mc={}; Object.values(USERS).filter(u=>u.role==="paciente").forEach(u=>(u.motivos||[]).forEach(m=>mc[m]=(mc[m]||0)+1));
  const motivos=Object.keys(mc).map(k=>({label:k,value:mc[k]})).sort((a,b)=>b.value-a.value).slice(0,6);
  return {fila,ativo,encer,total:real.length,pac,totalMsgs,avgWait,therItems,horas,motivos};
}

  rep.innerHTML=`
    <h2 style="font-family:'Newsreader',serif;font-weight:500;font-size:26px;margin:0 0 4px;">Relatórios</h2>

    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:24px;">
      ${repCard("Tempo médio de espera",fmtDur(r.avgWait),"da entrada na fila até o início do atendimento")}
      ${repCard("Pacientes únicos",r.pac,"pessoas que buscaram apoio")}
      ${repCard("Mensagens trocadas",r.totalMsgs,"total na plataforma")}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;">
      ${chartCard("Atendimentos por terapeuta",tbars)}
      ${chartCard("Movimento por horário",hbars)}
    </div>
    ${chartCard("Temas mais comuns (cadastros)",mbars)}
    <p style="text-align:center;color:#a39d92;font-size:12px;margin:22px 0 0;">Números calculados a partir dos atendimentos reais registrados na plataforma.</p>`;
}

        <label style="display:block;font-size:13px;font-weight:600;color:#6b655b;margin-bottom:6px;">Papel</label>
        <select id="apRole" class="field" style="margin-bottom:16px;"><option value="terapeuta">Terapeuta</option><option value="gestao">Gestão</option></select>
        ${pf("CRP (terapeuta)","apCrp","","text","CRP 00/00000")}
        ${pf("Senha temporária","apSenha","","text","mín. 4 caracteres")}
        <div id="apErr" style="color:#b5483a;font-size:13px;font-weight:600;min-height:18px;margin:2px 0 8px;"></div>
        <button id="apSave" class="primary">Adicionar à equipe</button>
      </div>
    </div>
  </div>`;
  document.getElementById("apClose").onclick=closeModal;
  document.getElementById("modalOverlay").onclick=e=>{ if(e.target.id==="modalOverlay") closeModal(); };
  document.getElementById("apSave").onclick=saveAddProfessional;
}
async function saveAddProfessional(){
  const err=document.getElementById("apErr");
  if(err){ err.style.color="#6b655b"; err.style.fontWeight="600";
    err.innerHTML="Por segurança, criar acessos de profissional é feito no painel do Supabase:<br>"+
      "Authentication → Users → <b>Add user</b> (defina o e-mail e, em <i>User metadata</i>, <code>{\"role\":\"terapeuta\"}</code> ou <code>\"gestao\"</code>).<br>"+
      "Depois o profissional completa o perfil (foto, CRP) ao entrar. Uma função de convite pela própria tela entra numa próxima fase."; }
}
async function _saveAddProfessionalOld(){
  const v=id=>(document.getElementById(id).value||"").trim();
  const err=document.getElementById("apErr");
  const nome=v("apNome"), email=v("apEmail").toLowerCase(), role=v("apRole"), crp=v("apCrp"), senha=v("apSenha");
  if(!nome||!email||!senha){ err.textContent="Preencha nome, e-mail e senha."; return; }
  closeModal(); toast("Profissional adicionado à equipe."); refreshGestao(true);
}

/* ============================================================
   MENSAGENS (render + diff) e ÁUDIO
   ============================================================ */
function sigOf(msgs){ return msgs.length+":"+(msgs.length?msgs[msgs.length-1].id:"0"); }
async function refreshConvMessages(convId, wrapId, scrollId, cozy, force, readOnly){
  const wrap=document.getElementById(wrapId); if(!wrap) return;
  const msgs=await loadMsgs(convId);
  const mineRole = S.session.role==="terapeuta"?"terapeuta":(S.session.role==="paciente"?"paciente":"__none__");
  const intro = `<div style="text-align:center;font-size:12px;color:#9a9384;margin-bottom:2px;position:relative;z-index:1;">${msgs.length?(cozy?'Suas conversas são privadas e seguras 🔒':'Atendimento iniciado às '+nowHM(msgs[0].ts)):'Sem mensagens ainda.'}</div>`;
  const html=intro+msgs.map(m=>bubble(m, m.from===mineRole, cozy)).join("");
  if(wrap.dataset.sig!==convId+":"+sigOf(msgs)){
    wrap.dataset.sig=convId+":"+sigOf(msgs);
    wrap.innerHTML=html; bindAudio(wrap);
    const sc=document.getElementById(scrollId);
    if(sc&&(force||sc.scrollHeight-sc.scrollTop-sc.clientHeight<200)) sc.scrollTop=sc.scrollHeight;
  }
}
function bindAudio(scope){
  scope.querySelectorAll(".audio-msg").forEach(el=>{
    const btn=el.querySelector(".audio-play");
    if(btn) btn.onclick=()=>toast("Reprodução de áudio chega na fase do Storage.");
  });
}
async function startRecording(who){
  toast("Áudio chega na próxima fase (Supabase Storage). Por enquanto, use texto.");
}
function stopRecording(keep){ if(!S.recording) return; clearInterval(S.recording.timer); S.recording.cancelled=!keep; try{ S.recording.mr.stop(); }catch(e){ const rb=S.recording.recBar; S.recording=null; recBarShow(rb,false);} }
function recBarShow(id,show){ const b=document.getElementById(id); if(b) b.style.display=show?"flex":"none"; const t=document.getElementById(id==="tRecBar"?"tRecTime":"pRecTime"); if(t&&show)t.textContent="0:00"; }
function blobToDataURL(blob){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);}); }

/* ---------- toast ---------- */
function toast(msg){ document.querySelectorAll(".toast").forEach(t=>t.remove()); const el=document.createElement("div"); el.className="toast"; el.textContent=msg; document.body.appendChild(el); clearTimeout(S.toastTimer); S.toastTimer=setTimeout(()=>el.remove(),2600); }

/* ============================================================
/* ============================================================
   atualização periódica (rede de segurança; o tempo real é por push)
   ============================================================ */
setInterval(async()=>{
  if(!sb || !PROFILE) return;
  await loadSettings();
  if(S.screen==="patient") refreshPatient(false);
  else if(S.screen==="therapist") refreshTherapist(false);
  else if(S.screen==="gestao") refreshGestao(false);
},6000);

/* ============================================================
   init — sobe o Supabase, restaura sessão e roteia
   ============================================================ */
(async function(){
  if(!initSupabase()){ S.screen="login"; render(); return; }
  try{ await loadSettings(); }catch(e){}
  sb.auth.onAuthStateChange((event)=>{
    if(event==="SIGNED_OUT"){ stopRealtime(); PROFILE=null; S.session=null; S.screen="login"; render(); }
  });
  const { data } = await sb.auth.getSession();
  if(data && data.session){ await afterAuth(); }
  else { S.screen="login"; render(); }
})();
</script>
